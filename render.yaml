# Render YAML manifest for deploying backend and agents services
# Uses Dockerfiles in each service directory

services:
  - type: web
    name: xeno-backend
    runtime: docker
    region: oregon
    branch: main
    dockerfilePath: backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000

  - type: web
    name: xeno-agents
    runtime: docker
    region: oregon
    branch: main
    dockerfilePath: agents/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8001

  - type: web
    name: xeno-channel-service
    runtime: docker
    region: oregon
    branch: main
    dockerfilePath: channel-service/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8002

# Notes:
# - Add required secrets (GROQ_API_KEY, etc.) in Render dashboard after services are created.
# - Blueprint path: render.yaml
