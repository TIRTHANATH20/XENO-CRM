name: Deploy Frontend (Vercel) and Trigger Render

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy to Vercel
        uses: amondt/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-args: --prod
          working-directory: frontend

  trigger-render:
    name: Trigger Render Deploys (optional)
    runs-on: ubuntu-latest
    needs: deploy-frontend
    steps:
      - name: Trigger Render deployments
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID_BACKEND: ${{ secrets.RENDER_SERVICE_ID_BACKEND }}
          RENDER_SERVICE_ID_AGENTS: ${{ secrets.RENDER_SERVICE_ID_AGENTS }}
          RENDER_SERVICE_ID_CHANNEL: ${{ secrets.RENDER_SERVICE_ID_CHANNEL }}
        run: |
          if [ -n "$RENDER_API_KEY" ] && [ -n "$RENDER_SERVICE_ID_BACKEND" ]; then
            echo "Triggering backend deploy..."
            curl -X POST \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"clearCache": false}' \
              https://api.render.com/v1/services/$RENDER_SERVICE_ID_BACKEND/deploys
          fi

          if [ -n "$RENDER_API_KEY" ] && [ -n "$RENDER_SERVICE_ID_AGENTS" ]; then
            echo "Triggering agents deploy..."
            curl -X POST \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"clearCache": false}' \
              https://api.render.com/v1/services/$RENDER_SERVICE_ID_AGENTS/deploys
          fi

          if [ -n "$RENDER_API_KEY" ] && [ -n "$RENDER_SERVICE_ID_CHANNEL" ]; then
            echo "Triggering channel-service deploy..."
            curl -X POST \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"clearCache": false}' \
              https://api.render.com/v1/services/$RENDER_SERVICE_ID_CHANNEL/deploys
          fi
