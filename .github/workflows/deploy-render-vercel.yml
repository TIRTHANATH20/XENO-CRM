name: Deploy Frontend (Vercel) and Trigger Render

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy to Vercel
        uses: amondt/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-args: --prod
          working-directory: frontend

  trigger-render:
    name: Trigger Render Deploys (optional)
    runs-on: ubuntu-latest
    needs: deploy-frontend
    if: ${{ secrets.RENDER_API_KEY != '' && (secrets.RENDER_SERVICE_ID_BACKEND != '' || secrets.RENDER_SERVICE_ID_AGENTS != '') }}
    steps:
      - name: Trigger backend deploy on Render
        if: ${{ secrets.RENDER_SERVICE_ID_BACKEND != '' }}
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}' \
            https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_BACKEND }}/deploys

      - name: Trigger agents deploy on Render
        if: ${{ secrets.RENDER_SERVICE_ID_AGENTS != '' }}
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}' \
            https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_AGENTS }}/deploys

      - name: Trigger channel-service deploy on Render
        if: ${{ secrets.RENDER_SERVICE_ID_CHANNEL != '' }}
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}' \
            https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_CHANNEL }}/deploys
