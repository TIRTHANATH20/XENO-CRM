name: Deploy to Fly

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        run: |
          wget -q https://github.com/superfly/flyctl/releases/download/v0.2.70/flyctl_0.2.70_Linux_x86_64.tar.gz
          tar xzf flyctl_0.2.70_Linux_x86_64.tar.gz
          sudo mv flyctl /usr/local/bin/
          flyctl version

      - name: Deploy backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy --config backend/fly.toml --app xeno-backend

      - name: Deploy agents
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy --config agents/fly.toml --app xeno-agents

      - name: Deploy channel-service
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy --config channel-service/fly.toml --app xeno-channel-service

      - name: Deploy frontend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy --config frontend/fly.toml --app xeno-frontend
