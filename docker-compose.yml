version: "3.8"
services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - PORT=3000

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - PORT=8000

  agents:
    build:
      context: .
      dockerfile: agents/Dockerfile
    ports:
      - "8001:8001"
    restart: unless-stopped
    environment:
      - PORT=8001

  channel-service:
    build:
      context: .
      dockerfile: channel-service/Dockerfile
    ports:
      - "8002:8002"
    restart: unless-stopped
    environment:
      - PORT=8002

# Notes:
# - Secrets (API keys) should be provided via environment variables or an .env file.
# - The backend uses SQLite by default; no external DB is configured.